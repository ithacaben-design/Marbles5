<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gamified Box</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050505; font-family: 'Georgia', serif; }
        canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
        
        /* The Dialogue Overlay: The only text permitted */
        #dialogue-overlay {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            text-align: center;
            color: rgba(212, 175, 55, 0.9);
            font-size: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 20;
            opacity: 0;
            transition: opacity 1s ease, transform 1s ease;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        #dialogue-overlay.visible {
            opacity: 1;
            transform: translate(-50%, -60%);
        }

        /* Subtle background texture */
        #texture-overlay {
            position: absolute; inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/p6.png');
            opacity: 0.1; pointer-events: none; z-index: 5;
        }

        #error-overlay { position: absolute; top: 10px; left: 10px; color: #ff5555; font-family: monospace; z-index: 9999; pointer-events: none; }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

    <div id="texture-overlay"></div>
    <div id="dialogue-overlay"></div>
    <div id="error-overlay"></div>

    <script>
        function initApp() {
            try {
                // Dialogue content for the 5 pillars
                const DIALOGUE = {
                    sleep: ["Rest restores the mind", "Enter the quiet", "Dream to resolve"],
                    sunlight: ["Seek the morning light", "Warmth anchors the clock", "Clarity follows the sun"],
                    movement: ["Energy flows with action", "Strengthen the vessel", "Motion is medicine"],
                    nutrition: ["Fuel with intent", "Simplicity sustains", "Nourish the core"],
                    relationships: ["Connection is life", "Presence is a gift", "We grow together"]
                };

                const PILLARS = [
                    { id: 'sleep', color: 0xd4af37, shape: 'TorusKnotGeometry', args: [0.2, 0.06, 64, 8] },
                    { id: 'sunlight', color: 0x4287f5, shape: 'OctahedronGeometry', args: [0.3] },
                    { id: 'movement', color: 0xf54242, shape: 'SphereGeometry', args: [0.3, 32, 32] },
                    { id: 'nutrition', color: 0x9c42f5, shape: 'CylinderGeometry', args: [0.2, 0.2, 0.4, 16] },
                    { id: 'relationships', color: 0x42f569, shape: 'TorusGeometry', args: [0.2, 0.1, 16, 32] }
                ];

                const { Engine, Runner, Bodies, Composite, Constraint, Events } = Matter;
                const engine = Engine.create();
                engine.gravity.y = 0;

                let currentMode = 'sandbox'; 
                let screenW = window.innerWidth || 800;
                let screenH = window.innerHeight || 600;

                const scene = new THREE.Scene();
                scene.fog = new THREE.FogExp2(0x050505, 0.02);
                let aspect = screenW / screenH;
                const viewSize = 10; 
                const camera = new THREE.OrthographicCamera(-viewSize*aspect/2, viewSize*aspect/2, viewSize/2, -viewSize/2, 0.1, 100);
                camera.position.z = 10;

                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(screenW, screenH);
                renderer.shadowMap.enabled = true;
                document.body.appendChild(renderer.domElement);

                scene.add(new THREE.AmbientLight(0xffffff, 0.4));
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
                dirLight.position.set(5, 5, 10);
                dirLight.castShadow = true;
                scene.add(dirLight);

                window.addEventListener('resize', () => {
                    screenW = window.innerWidth;
                    screenH = window.innerHeight;
                    aspect = screenW / screenH;
                    camera.left = -viewSize * aspect / 2;
                    camera.right = viewSize * aspect / 2;
                    camera.top = viewSize / 2;
                    camera.bottom = -viewSize / 2;
                    camera.updateProjectionMatrix();
                    renderer.setSize(screenW, screenH);
                });

                const woodMat = new THREE.MeshStandardMaterial({ color: 0x3d2b1f, roughness: 0.9 });
                const trayMat = new THREE.MeshStandardMaterial({ color: 0x2a1d15, roughness: 0.8 });
                const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a100a, roughness: 1.0 });
                const flipperMat = new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 0.5, roughness: 0.4 });
                const brassMat = new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 0.9, roughness: 0.2 });
                const riverStoneMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.3, metalness: 0.1 });
                
                const boxWidth = viewSize * aspect;
                const boxHeight = viewSize;
                
                const floor = new THREE.Mesh(new THREE.PlaneGeometry(boxWidth * 2, boxHeight * 2), floorMat);
                floor.receiveShadow = true;
                scene.add(floor);

                const physicsBodies = [];
                function createWall(x, y, w, h) {
                    const body = Bodies.rectangle(x, y, w, h, { isStatic: true, friction: 0.5, restitution: 0.2 });
                    physicsBodies.push(body);
                    const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, 1.5), woodMat);
                    mesh.position.set(x, -y, 0.75); 
                    scene.add(mesh);
                }

                createWall(0, -boxHeight/2 - 0.5, boxWidth + 2, 1); 
                createWall(0, boxHeight/2 + 0.5, boxWidth + 2, 1); 
                createWall(-boxWidth/2 - 0.5, 0, 1, boxHeight); 
                createWall(boxWidth/2 + 0.5, 0, 1, boxHeight); 

                const marbles = [];
                PILLARS.forEach((pillar, i) => {
                    const x = -boxWidth/2 + 1 + Math.random();
                    const y = -boxHeight/2 + 1 + Math.random();
                    const body = Bodies.circle(x, y, 0.3, { restitution: 0.6, friction: 0.001, density: 0.05 });
                    physicsBodies.push(body);
                    const mat = new THREE.MeshPhysicalMaterial({ color: 0xffffff, transmission: 0.9, opacity: 1, roughness: 0.1 });
                    const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), mat);
                    mesh.castShadow = true;
                    scene.add(mesh);
                    marbles.push({ body, mesh, material: mat, pillarData: pillar, fillLevel: 0, currentScale: 1, logs: 0 });
                });

                // --- NAVIGATION INSET MARBLES ---
                const INSET_MODES = [
                    { id: 'sandbox', color: 0x777777 },
                    { id: 'orbit', color: 0xa855f7 },
                    { id: 'billiards', color: 0x1a5e20 },
                    { id: 'pinball', color: 0x22c55e },
                    { id: 'maze', color: 0x3b82f6 },
                    { id: 'koi', color: 0xffffff }
                ];

                const insetButtons = [];
                const insetSpacing = Math.min(boxWidth / 7, 1.2);
                const insetStartX = -((INSET_MODES.length - 1) * insetSpacing) / 2;

                INSET_MODES.forEach((mode, i) => {
                    const mat = new THREE.MeshPhysicalMaterial({ 
                        color: 0x111111, emissive: 0x000000, emissiveIntensity: 0, 
                        transmission: 0.8, roughness: 0.1 
                    });
                    const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.2, 32, 32), mat);
                    const x = insetStartX + i * insetSpacing;
                    const y = boxHeight/2 - 0.45; 
                    mesh.position.set(x, -y, 0.4);
                    scene.add(mesh);

                    const light = new THREE.PointLight(mode.color, 0, 3);
                    light.position.copy(mesh.position);
                    light.position.z += 0.5;
                    scene.add(light);

                    insetButtons.push({ mesh, material: mat, light, modeData: mode, unlocked: (mode.id === 'sandbox') });
                });

                // BILLIARDS POCKETS
                const billiardsPockets = [];
                const pocketGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.1, 32);
                const pocketMat = new THREE.MeshBasicMaterial({ color: 0x050505 });
                [
                    {x: -boxWidth/2 + 0.6, y: -boxHeight/2 + 0.6},
                    {x: boxWidth/2 - 0.6, y: -boxHeight/2 + 0.6},
                    {x: -boxWidth/2 + 0.6, y: boxHeight/2 - 0.6},
                    {x: boxWidth/2 - 0.6, y: boxHeight/2 - 0.6},
                    {x: -boxWidth/2 + 0.4, y: 0},
                    {x: boxWidth/2 - 0.4, y: 0}
                ].forEach(p => {
                    const mesh = new THREE.Mesh(pocketGeo, pocketMat);
                    mesh.position.set(p.x, -p.y, 0.1);
                    mesh.rotation.x = Math.PI / 2;
                    mesh.visible = false;
                    scene.add(mesh);
                    billiardsPockets.push(mesh);
                });
                
                const mazeWalls = [];
                [
                    { x: -2.0, y: 0.0, w: 0.5, h: 4.0 }, 
                    { x: 2.0, y: -2.0, w: 4.0, h: 0.5 }, 
                    { x: 1.0, y: 2.0, w: 5.0, h: 0.5 }   
                ].forEach(w => {
                    const body = Bodies.rectangle(w.x, w.y, w.w, w.h, { isStatic: true, isSensor: true });
                    physicsBodies.push(body);
                    const mesh = new THREE.Mesh(new THREE.BoxGeometry(w.w, w.h, 1.5), woodMat);
                    mesh.position.set(w.x, -w.y, 0.75); 
                    mesh.visible = false;
                    scene.add(mesh);
                    mazeWalls.push({body, mesh});
                });

                const pinballElements = [];
                [ { x: 0, y: -2.5, r: 0.6 }, { x: -1.5, y: -1.0, r: 0.5 }, { x: 1.5, y: -1.0, r: 0.5 } ].forEach(b => {
                    const body = Bodies.circle(b.x, b.y, b.r, { isStatic: true, isSensor: true, restitution: 1.5 });
                    physicsBodies.push(body);
                    const mesh = new THREE.Mesh(new THREE.CylinderGeometry(b.r, b.r, 0.5, 32), brassMat);
                    mesh.rotation.x = Math.PI / 2;
                    mesh.position.set(b.x, -b.y, 0.25);
                    mesh.castShadow = true;
                    mesh.visible = false;
                    scene.add(mesh);
                    pinballElements.push({body, mesh});
                });

                [ { x: -2.2, y: 1.5, w: 0.4, h: 3, angle: -Math.PI / 6 }, { x: 2.2, y: 1.5, w: 0.4, h: 3, angle: Math.PI / 6 } ].forEach(w => {
                    const body = Bodies.rectangle(w.x, w.y, w.w, w.h, { isStatic: true, isSensor: true, angle: w.angle, restitution: 0.8 });
                    physicsBodies.push(body);
                    const mesh = new THREE.Mesh(new THREE.BoxGeometry(w.w, w.h, 1.5), woodMat);
                    mesh.position.set(w.x, -w.y, 0.75);
                    mesh.rotation.z = -w.angle; 
                    mesh.visible = false;
                    scene.add(mesh);
                    pinballElements.push({body, mesh});
                });

                const flippers = [];
                function createFlipper(x, y, w, h, isLeft) {
                    const body = Bodies.rectangle(x, y, w, h, { isSensor: true }); 
                    const pivotX = isLeft ? x - w/2 + 0.2 : x + w/2 - 0.2;
                    const pivot = Constraint.create({ pointA: { x: pivotX, y: y }, bodyB: body, pointB: { x: isLeft ? -w/2 + 0.2 : w/2 - 0.2, y: 0 }, stiffness: 1, length: 0 });
                    const spring = Constraint.create({ pointA: { x: x, y: y + 2 }, bodyB: body, pointB: { x: isLeft ? w/2 : -w/2, y: 0 }, stiffness: 0.02, length: 1 });
                    physicsBodies.push(body);
                    Composite.add(engine.world, [pivot, spring]);
                    const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, 1.0), flipperMat);
                    mesh.position.z = 0.5;
                    mesh.visible = false;
                    scene.add(mesh);
                    flippers.push({ body, mesh, isLeft });
                }
                createFlipper(-1.5, boxHeight/2 - 1.5, 2.5, 0.4, true);
                createFlipper(1.5, boxHeight/2 - 1.5, 2.5, 0.4, false);

                const koiElements = [];
                const koiTray = new THREE.Mesh(new THREE.BoxGeometry(boxWidth, 1.5, 0.8), trayMat);
                koiTray.position.set(0, -(boxHeight/2 - 0.75), 0.4);
                koiTray.visible = false;
                scene.add(koiTray);
                koiElements.push(koiTray);

                const stonePos = [
                    {x: -1.2, y: -2.0, s: 0.6}, {x: 1.8, y: -2.8, s: 0.9},
                    {x: -2.5, y: 0.5, s: 0.8}, {x: 2.2, y: 0.2, s: 0.7},
                    {x: 0.5, y: 2.5, s: 0.5}, {x: -1.0, y: 3.5, s: 0.4},
                    {x: 1.8, y: 2.8, s: 0.7}, {x: 0.2, y: -0.5, s: 0.5}
                ];
                stonePos.forEach(p => {
                    const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 16), riverStoneMat);
                    mesh.scale.set(p.s, p.s * 0.4, p.s * 0.7);
                    mesh.position.set(p.x, -p.y, 0.2);
                    mesh.rotation.z = Math.random() * Math.PI;
                    mesh.visible = false;
                    scene.add(mesh);
                    koiElements.push(mesh);
                });

                Composite.add(engine.world, physicsBodies);

                const state = { unlockedOrbit: false, unlockedBilliards: false, unlockedPinball: false, unlockedMaze: false, unlockedKoi: false };

                function logHabit(marble) {
                    if (marble.fillLevel >= 0.9) return;
                    
                    // Show Dialogue
                    const prompts = DIALOGUE[marble.pillarData.id];
                    const promptText = prompts[marble.logs % prompts.length];
                    const overlay = document.getElementById('dialogue-overlay');
                    overlay.innerText = promptText;
                    overlay.classList.add('visible');
                    setTimeout(() => overlay.classList.remove('visible'), 3000);

                    marble.logs++;
                    marble.fillLevel = Math.round((marble.fillLevel + 0.10) * 10) / 10;
                    marble.fillLevel = Math.min(marble.fillLevel, 0.9);

                    const targetColor = new THREE.Color(marble.pillarData.color);
                    const hollowColor = new THREE.Color(0xffffff);
                    const visualProgress = marble.fillLevel / 0.9;
                    marble.material.color.copy(hollowColor).lerp(targetColor, visualProgress);
                    marble.material.transmission = 0.9 - (0.8 * visualProgress);

                    checkUnlocks();
                }

                function checkUnlocks() {
                    const isOrbitUnlocked = marbles.some(m => m.fillLevel > 0);
                    const totalFillCount = marbles.reduce((sum, m) => sum + (m.fillLevel > 0 ? 1 : 0), 0);
                    const isBilliardsUnlocked = totalFillCount >= 2 || marbles.some(m => m.fillLevel >= 0.2);
                    const isPinballUnlocked = marbles.some(m => m.fillLevel >= 0.3);
                    const isMazeUnlocked = marbles.some(m => m.fillLevel >= 0.45);
                    const isKoiUnlocked = marbles.every(m => m.fillLevel >= 0.9);

                    insetButtons.forEach(btn => {
                        const mId = btn.modeData.id;
                        let unlocked = false;
                        if (mId === 'sandbox') unlocked = true;
                        if (mId === 'orbit') unlocked = isOrbitUnlocked;
                        if (mId === 'billiards') unlocked = isBilliardsUnlocked;
                        if (mId === 'pinball') unlocked = isPinballUnlocked;
                        if (mId === 'maze') unlocked = isMazeUnlocked;
                        if (mId === 'koi') unlocked = isKoiUnlocked;

                        btn.unlocked = unlocked;
                        const isActive = currentMode === mId;

                        if (unlocked) {
                            btn.material.color.setHex(btn.modeData.color);
                            btn.material.emissive.setHex(btn.modeData.color);
                            btn.material.emissiveIntensity = isActive ? 2.5 : 1.0;
                            btn.light.intensity = isActive ? 1.5 : 0.5;
                        } else {
                            btn.material.color.setHex(0x111111);
                            btn.material.emissive.setHex(0x000000);
                            btn.material.emissiveIntensity = 0;
                            btn.light.intensity = 0;
                        }
                    });

                    state.unlockedOrbit = isOrbitUnlocked;
                    state.unlockedBilliards = isBilliardsUnlocked;
                    state.unlockedPinball = isPinballUnlocked;
                    state.unlockedMaze = isMazeUnlocked;
                    state.unlockedKoi = isKoiUnlocked;
                }

                window.activateMode = function(newMode) {
                    if (newMode === 'orbit' && !state.unlockedOrbit) return;
                    if (newMode === 'billiards' && !state.unlockedBilliards) return;
                    if (newMode === 'pinball' && !state.unlockedPinball) return;
                    if (newMode === 'maze' && !state.unlockedMaze) return;
                    if (newMode === 'koi' && !state.unlockedKoi) return;

                    if (newMode === 'koi' && currentMode !== 'koi') {
                        playAcousticRipple();
                        if (navigator.vibrate) navigator.vibrate([50, 100, 50, 100, 200]);
                    }

                    currentMode = newMode;
                    checkUnlocks();

                    floorMat.color.setHex(0x1a100a);
                    marbles.forEach(m => {
                        m.body.isSensor = false; m.mesh.visible = true;
                        m.body.restitution = 0.6; m.body.frictionAir = 0.001;
                        Matter.Body.scale(m.body, 1/m.currentScale, 1/m.currentScale);
                        m.mesh.scale.set(1, 1, 1); m.currentScale = 1;
                        Matter.Body.setAngularVelocity(m.body, 0);
                        
                        const targetColor = new THREE.Color(m.pillarData.color);
                        const hollowColor = new THREE.Color(0xffffff);
                        const visualProgress = m.fillLevel / 0.9;
                        m.material.color.copy(hollowColor).lerp(targetColor, visualProgress);
                        m.material.transmission = 0.9 - (0.8 * visualProgress);
                    });
                    
                    billiardsPockets.forEach(p => { p.visible = false; });
                    mazeWalls.forEach(w => { w.body.isSensor = true; w.mesh.visible = false; });
                    pinballElements.forEach(e => { e.body.isSensor = true; e.mesh.visible = false; });
                    flippers.forEach(f => { f.body.isSensor = true; f.mesh.visible = false; });
                    koiElements.forEach(e => { e.visible = false; });
                    engine.gravity.x = 0; engine.gravity.y = 0;

                    if (newMode === 'orbit') {
                        const sorted = [...marbles].sort((a, b) => a.fillLevel - b.fillLevel);
                        sorted.forEach((m, i) => {
                            m.body.isSensor = true; 
                            const angle = (i / sorted.length) * (Math.PI * 2);
                            Matter.Body.setPosition(m.body, { x: Math.cos(angle) * 3, y: Math.sin(angle) * 3 });
                            Matter.Body.setVelocity(m.body, { x: 0, y: 0 });
                        });
                    }
                    else if (newMode === 'billiards') {
                        floorMat.color.setHex(0x1a5e20);
                        billiardsPockets.forEach(p => p.visible = true);
                        engine.gravity.y = 0; engine.gravity.x = 0;
                        marbles.forEach((m, i) => {
                            m.body.restitution = 0.9; m.body.frictionAir = 0.015;
                            if (i === 0) m.material.color.setHex(0xd4af37);
                            else m.material.color.setHex(m.pillarData.color);
                            m.material.transmission = 0.1;
                        });
                        const cue = marbles[0];
                        Matter.Body.setPosition(cue.body, { x: 0, y: boxHeight/4 });
                        const r = 0.3; const startY = -boxHeight/4; const hOffset = r * Math.sqrt(3);
                        const rackPositions = [{x: 0, y: startY}, {x: -r, y: startY - hOffset}, {x: r, y: startY - hOffset}, {x: 0, y: startY - (hOffset * 2)}];
                        for(let i=1; i<marbles.length; i++) Matter.Body.setPosition(marbles[i].body, rackPositions[i-1]);
                    }
                    else if (newMode === 'pinball') {
                        floorMat.color.setHex(0x3e1505); engine.gravity.y = 1.2;
                        flippers.forEach(f => { f.body.isSensor = false; f.mesh.visible = true; });
                        pinballElements.forEach(e => { e.body.isSensor = false; e.mesh.visible = true; });
                        const activeBall = marbles[0]; 
                        Matter.Body.scale(activeBall.body, 0.5, 0.5); activeBall.mesh.scale.set(0.5, 0.5, 0.5); activeBall.currentScale = 0.5;
                        Matter.Body.setPosition(activeBall.body, { x: 0, y: boxHeight/2 - 2.5 });
                        for (let i = 1; i < marbles.length; i++) {
                            Matter.Body.setPosition(marbles[i].body, { x: 100, y: 100 });
                            marbles[i].body.isSensor = true; marbles[i].mesh.visible = false;
                        }
                    }
                    else if (newMode === 'maze') mazeWalls.forEach(w => { w.body.isSensor = false; w.mesh.visible = true; });
                    else if (newMode === 'koi') {
                        floorMat.color.setHex(0x111111);
                        koiElements.forEach(e => { e.visible = true; });
                        const tWidth = Math.min(boxWidth * 0.9, 8);
                        const sX = -tWidth / 2;
                        const step = tWidth / 5;
                        marbles.forEach((m, i) => {
                            if (m.pillarData.shape && THREE[m.pillarData.shape]) {
                                m.mesh.geometry.dispose();
                                m.mesh.geometry = new THREE[m.pillarData.shape](...m.pillarData.args);
                            }
                            m.body.isSensor = true; 
                            const targetX = sX + step * i + (step/2);
                            const targetY = boxHeight/2 - 1.2; 
                            Matter.Body.setPosition(m.body, { x: targetX, y: targetY });
                            Matter.Body.setVelocity(m.body, { x: 0, y: 0 });
                        });
                    }
                };

                const raycaster = new THREE.Raycaster();
                const mouseCoords = new THREE.Vector2();
                let flickState = { active: false, marble: null, startX: 0, startY: 0 };
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                let audioCtx = null;

                window.addEventListener('pointerdown', (e) => {
                    if (!audioCtx && AudioContext) { try { audioCtx = new AudioContext(); } catch(err) {} }
                    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                    
                    mouseCoords.x = (e.clientX / window.innerWidth) * 2 - 1;
                    mouseCoords.y = -(e.clientY / window.innerHeight) * 2 + 1;
                    raycaster.setFromCamera(mouseCoords, camera);

                    const activeMarbles = marbles.filter(m => m.mesh.visible).map(m => m.mesh);
                    const navigationButtons = insetButtons.map(b => b.mesh);
                    const intersects = raycaster.intersectObjects([...activeMarbles, ...navigationButtons]);

                    if (intersects.length > 0) {
                        const hitMesh = intersects[0].object;
                        
                        const navBtn = insetButtons.find(b => b.mesh === hitMesh);
                        if (navBtn) {
                            if (navBtn.unlocked) window.activateMode(navBtn.modeData.id);
                            return;
                        }

                        const marble = marbles.find(m => m.mesh === hitMesh);
                        if (marble) {
                            flickState = { active: true, marble: marble, startX: e.clientX, startY: e.clientY };
                            logHabit(marble); 
                            return;
                        }
                    }

                    if (currentMode === 'pinball') {
                        const isLeft = e.clientX < window.innerWidth / 2;
                        flippers.forEach(f => { if (f.isLeft === isLeft) Matter.Body.applyForce(f.body, { x: f.body.position.x + (f.isLeft ? 1 : -1), y: f.body.position.y }, { x: 0, y: -0.06 }); });
                    }
                });

                window.addEventListener('pointerup', (e) => {
                    if (flickState.active && flickState.marble) {
                        const dx = e.clientX - flickState.startX;
                        const dy = e.clientY - flickState.startY;
                        if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
                            let forceX = dx * 0.0003; let forceY = dy * 0.0003;
                            const maxForce = 0.08; forceX = Math.max(-maxForce, Math.min(maxForce, forceX)); forceY = Math.max(-maxForce, Math.min(maxForce, forceY));
                            Matter.Body.applyForce(flickState.marble.body, flickState.marble.body.position, { x: forceX, y: forceY });
                        }
                        flickState.active = false; flickState.marble = null;
                    }
                });

                window.addEventListener('deviceorientation', (e) => {
                    if (currentMode === 'sandbox' || currentMode === 'maze') {
                        let x = Math.max(-90, Math.min(90, e.gamma)); 
                        let y = Math.max(-90, Math.min(90, e.beta));  
                        engine.gravity.x = (x / 90) * 2; engine.gravity.y = (y / 90) * 2;
                    }
                });

                function playAcousticRipple() {
                    if (!audioCtx) return;
                    const notes = [400, 500, 600, 800, 1200];
                    notes.forEach((freq, i) => {
                        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                        osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.1);
                        gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.1);
                        gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + i * 0.1 + 0.05);
                        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.1 + 0.3);
                        osc.start(audioCtx.currentTime + i * 0.1); osc.stop(audioCtx.currentTime + i * 0.1 + 0.3);
                    });
                }

                function playAcousticTap(relativeSpeed) {
                    if (!audioCtx) return;
                    const vol = Math.max(0.05, Math.min(0.6, relativeSpeed * 0.05));
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.05);
                    gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.05);
                    if (navigator.vibrate && vol > 0.2) { navigator.vibrate(Math.min(15, relativeSpeed * 2)); }
                }

                Events.on(engine, 'collisionStart', (event) => {
                    const pairs = event.pairs;
                    for (let i = 0; i < pairs.length; i++) {
                        const { bodyA, bodyB } = pairs[i];
                        if (bodyA.isSensor || bodyB.isSensor) continue;
                        const speedA = bodyA.speed || 0; const speedB = bodyB.speed || 0; const relativeSpeed = speedA + speedB;
                        if (relativeSpeed > 0.5) { playAcousticTap(relativeSpeed); }
                    }
                });

                const runner = Runner.create();
                Runner.run(runner, engine);

                function animate() {
                    requestAnimationFrame(animate);
                    if (currentMode === 'koi') {
                        marbles.forEach(m => { m.mesh.rotation.x += 0.005; m.mesh.rotation.y += 0.005; });
                    }
                    marbles.forEach(m => {
                        m.mesh.position.x = m.body.position.x; m.mesh.position.y = -m.body.position.y;
                        if (currentMode !== 'koi') m.mesh.rotation.z = -m.body.angle;
                    });
                    flippers.forEach(f => { f.mesh.position.x = f.body.position.x; f.mesh.position.y = -f.body.position.y; f.mesh.rotation.z = -f.body.angle; });
                    renderer.render(scene, camera);
                }
                animate();

            } catch (err) {
                document.getElementById('error-overlay').innerText = `Error: ${err.message}`;
            }
        }

        if (document.readyState === 'complete' || document.readyState === 'interactive') { initApp(); } else { document.addEventListener('DOMContentLoaded', initApp); }
    </script>
</body>
</html>
